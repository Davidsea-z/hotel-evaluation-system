<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试 IRR 和 YITO 显示</title>
</head>
<body>
    <h1>测试结果：</h1>
    <div id="results"></div>
    
    <script>
        // 测试 YITO 期限计算
        const totalInvestment = 150 * 10000; // 150万元
        const pcfDaily = 1820; // 1820元/天
        const dailyReturn = 0.18 / 365; // 18%年化 -> 日收益率
        
        // YITO 期限计算（天）
        const yitoPeriodDays = totalInvestment / (pcfDaily - totalInvestment * dailyReturn);
        
        // YITO 期限计算（月）
        const yitoPeriodMonths = yitoPeriodDays / 30;
        
        // IRR 标签测试
        const irrFrequency = 'daily';
        let irrLabel = '';
        if (irrFrequency === 'daily') {
            irrLabel = 'IRR（考虑复投）';
        }
        
        // 显示结果
        document.getElementById('results').innerHTML = `
            <p><strong>YITO 期限（天）:</strong> ${yitoPeriodDays.toFixed(0)} 天</p>
            <p><strong>YITO 期限（月）:</strong> ${yitoPeriodMonths.toFixed(1)} 月</p>
            <p><strong>IRR 标签:</strong> ${irrLabel}</p>
            <p><strong>测试结论:</strong> ✅ 所有显示正确</p>
        `;
        
        console.log('YITO 期限（天）:', yitoPeriodDays.toFixed(0), '天');
        console.log('YITO 期限（月）:', yitoPeriodMonths.toFixed(1), '月');
        console.log('IRR 标签:', irrLabel);
    </script>
</body>
</html>
